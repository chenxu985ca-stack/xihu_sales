<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>西湖生物材料 — 销售助手</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="data.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>

<!-- Header -->
<header class="header">
  <button class="hamburger" aria-label="菜单">
    <span></span><span></span><span></span>
  </button>
  <div class="logo">🏥 <span>西湖</span>生物材料 · 销售助手</div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="搜索产品名称、编码、关键字…">
    <span class="search-icon">🔍</span>
  </div>
  <div class="header-actions">
    <span class="badge alt">📋 公司信息</span>
    <span class="badge" id="quoteBadge">📝 报价单 (<span id="quoteCount">0</span>)</span>
  </div>
</header>

<!-- Main Layout -->
<div class="main-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- Content -->
  <main class="content" id="content">
    <div class="content-header">
      <h2 id="contentTitle">全部产品</h2>
      <span class="result-count" id="resultCount"></span>
    </div>
    <div id="productList"></div>
  </main>
</div>

<!-- Quote Overlay -->
<div class="quote-overlay" id="quoteOverlay"></div>
<div class="quote-panel" id="quotePanel">
  <div class="quote-header">
    <h3>📝 报价单</h3>
    <button class="quote-close">✕</button>
  </div>
  <div class="quote-items" id="quoteItems">
    <div class="empty-state">
      <div class="icon">📋</div>
      <p>报价单是空的</p>
      <p style="font-size:12px;color:var(--text-light)">点击产品旁的 + 按钮添加</p>
    </div>
  </div>
  <div class="quote-footer">
    <div class="quote-total">
      <span>合计</span>
      <span class="total-price" id="quoteTotal">¥0.00</span>
    </div>
    <div class="quote-actions">
      <button class="btn btn-primary">🖨️ 打印报价</button>
      <button class="btn btn-outline">📋 复制</button>
      <button class="btn btn-danger">清空</button>
    </div>
  </div>
</div>

<!-- Company Modal -->
<div class="modal-overlay" id="companyModal">
  <div class="modal" id="companyModalInner"></div>
</div>

<!-- Quote Print Area (hidden, only for print) -->
<div class="quote-print" id="quotePrint"></div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

</body>
</html>
